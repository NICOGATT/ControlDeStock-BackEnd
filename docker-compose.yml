version: '3.9'

services: 
  backend: 
    build: . 
    container_name: controlDeStock-Backend
    ports: 
      - '3001:3000'
    environment:
      - NODE_ENV=docker
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=control_stock_db
      - DB_USER=root
      - DB_PASSWORD=root123
    depends_on: 
      mysql : 
        condition : service_healthy 
    restart: unless-stopped

  mysql: 
    image: mysql:8.0.45
    container_name: control_stock_db
    ports: 
      - '3308:3306'
    environment: 
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: control_stock_db
      MYSQL_ROOT_HOST: '%'
      MYSQL_ALLOW_EMPTY_PASSWORD: 'no'
    command: --default-authentication-plugin=mysql_native_password
    volumes: 
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s
    restart: unless-stopped

volumes:
  mysql_data: 