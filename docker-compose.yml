version: '3.9'

services: 
  backend: 
    build: . 
    container_name: controlDeStock-Backend
    ports: 
      - '3000:3000'
    environment:
      - NODE_ENV=docker
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=control_stock_db
      - DB_USER=root
      - DB_PASSWORD=root123
    depends_on: 
      mysql:
        condition: service_healthy
    restart: unless-stopped 

  mysql: 
    image: mysql:8.0
    container_name: control_stock_db
    ports: 
      - '3307:3306'
    environment: 
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: control_stock_db
    volumes: 
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -proot123 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s 
volumes:
  mysql_data: 